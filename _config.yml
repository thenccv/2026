
plugins: ['jekyll-include-cache']
banner: './imgs/banner.jpg'
# Theme files are vendored into this repository under _layouts, _includes, _sass, and assets.
title: NCCV2026
# Build settings
markdown: kramdown
sass:
  style: compressed

# Additional exclude from processing
exclude:
  - vendor
  - .github/
  - README.md
  - LICENSE.md
  - REDISTRIBUTED.md
  - purgecss.config.js

# Collections and their defaults
collections:
  talks:
    output: true
    permalink: /:collection/:title/
  speakers:
    output: true
    permalink: /:collection/:title/
  organizers:
    output: true
    permalink: /:collection/:title/
  rooms:
    output: true
    permalink: /:collection/:title/

defaults:
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
  - scope:
      path: ""
      type: speakers
    values:
      layout: speaker
  - scope:
      path: ""
      type: organizers
    values:
      layout: organizers
  - scope:
      path: ""
      type: rooms
    values:
      layout: room


conference:

  # Language
  lang: en

  # Timezone
  tz: "+01:00"

  # Show theme errors:
  show_errors: True

  # Navigation bar
  navigation:
    logo:
      #name: NCCV
      #img: '/imgs/banner.png'
    breakpoint: md
    links:
      - name: Attend
        relative_url: /attend/
      - name: Program
        relative_url: /program/
      # - name: Sessions
      #   relative_url: /talks/
      - name: Speakers
        relative_url: /speakers/
      - name: Paper submission
        relative_url: /papers/
      - name: Organizers
        relative_url: /organizers/
      - name: Location
        relative_url: /location/
      - name: Previous Editions
        menu:
          - name: 2026 (current)
            disabled: true
          - name: 2025
            absolute_url: https://thenccv.github.io/2025/
            disabled: false


  # Link Preview for Sharing
  link_preview:
    # also adapt "preposition" property at top for more meaningful descriptions
    disable: false
    img:
      #twitter: 'twitter_preview.png'      # inside /assets/images/
      #open_graph: 'facebook_preview.png'  # inside /assets/images/

  # Main landing page
  main:
    # logo:
    #   img: ''
    links:
      - name: Attend
        relative_url: /attend/
      - name: Program
        relative_url: /program/
      - name: Getting here
        relative_url: /location/
      - name: Register
        disabled: false
        absolute_url: 'https://www.aanmelder.nl/nccv2026/registration'
      - name: Submit your paper
        disabled: false
        absolute_url: 'https://docs.google.com/forms/d/e/1FAIpQLSeKfYeUMLep2oRSiiyjqINRB9Rg1P61f-M2HKcXydSO3kKBuQ/viewform'

  # Information boxes
  #info_bars:
  #  - title: Welcome to the Conference Theme for Jekyll!
  #    color: warning
  #    main_only: true
  #    text: |
  #      The Theme was originally made for the [Winterkongress](https://www.digitale-gesellschaft.ch/kongress/), a yearly conference of the [Digital Society Switzerland](https://digitale-gesellschaft.ch/).
  #      ---
  #     See the [README](github.com/DigitaleGesellschaft/jekyll-theme-conference/) on the project's GitHub repository for further information on how to configure and adapt it to your needs.
  # - text: This is just some random content for demonstration purposes.
  #   color: warning
  #   pages_only: true

  # Live indications
  live:
    date: 01.01.2020
    timezone: GMT+1
    stop:       3000  # in minutes
    streaming:
      enable: true
      pause:     60  # in minutes
      prepend:    5  # in minutes
      extend:     5  # in minutes
    demo:
      enable: false
      duration: 300  # in seconds
      pause:     10  # in seconds

  talks:
    # Talk categories
    main_categories:
      - name: Keynote
        color: success
      - name: Panel
        color: third
      - name: Oral
        color: warning
      - name: Posters
        color: info
      - name: Social
        color: fourth
      - name: Award
        color: fifth
      - name: Misc
        color: danger
      

    # Hide icons on talk overview page
    hide_icons: false

  speakers:
    # Show first and last name
    show_firstname: true

  organizers:
    # Show first and last name
    show_firstname: true

  location:
    # Disable links to locations
    hide: true
    # URL of location / room overview page
    url: '/location'
    # Main page title shown on location/room navigation bar
    navbar_title: 'Location'
    # Show map on location main page.  Set `map: false` if you don't want to
    # display it.
    map:
      # Initial map center point
      home_coord: 51.9778823, 5.7801109
      # Alternative map providers can be found on https://leaflet-extras.github.io/leaflet-providers/preview/
      # The following do match the Bootstrap design not too badly:
      #   - Thunderforest.Neighbourhood
      #   - Esri.WorldTopoMap
      map_provider: "OpenStreetMap.Mapnik"
      default_zoom: 17


  program:
    # URL of program page
    url: '/program'

    # Time steps in program table
    time_steps: 15 # in minutes

    # Show intermediary time steps (next to full hours)
    show_alltimes: true

